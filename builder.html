<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPTO Store | PC Builder</title>

    <link rel="stylesheet" href="style.css">

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- BANCO -->
    <script src="database.js" defer></script>

    <!-- BUILDER -->
    <script src="builder.js" defer></script>
</head>

<body>

<header class="topbar">
    <h1>XPTO STORE</h1>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="loja.html">Loja</a></li>
            <li><a href="servicos.html">Serviços</a></li>
            <li><a href="contato.html">Atendimento</a></li>
        </ul>
    </nav>
</header>

<main class="container">

<section class="hero">
    <h2>Construtor de PCs</h2>
    <p>Monte seu setup com compatibilidade automática</p>
</section>

<div class="builder-layout">

    <div class="builder-content">

        <div class="secao-peca">
            <h3>Placa-Mãe</h3>
            <div id="mb-box"></div>
        </div>

        <div class="secao-peca">
            <h3>CPU</h3>
            <div id="cpu-box"></div>
        </div>

        <div class="secao-peca">
            <h3>GPU</h3>
            <div id="gpu-box"></div>
        </div>

        <div class="secao-peca">
            <h3>RAM</h3>
            <div id="ram-box"></div>
        </div>

        <div class="secao-peca">
            <h3>Armazenamento</h3>
            <div id="storage-box"></div>
        </div>

        <div class="secao-peca">
            <h3>Fonte</h3>
            <div id="psu-box"></div>
        </div>

        <div class="secao-peca">
            <h3>Gabinete</h3>
            <div id="case-box"></div>
        </div>

    </div>

    <!-- SIDEBAR -->
    <aside class="resumo-sidebar">

        <h3>Resumo</h3>

        <div id="lista-resumo"></div>

        <div class="total-destaque">
            Total: R$ <span id="preco-total">0.00</span>
        </div>

        <div style="margin-top:10px">
            <strong>FPS estimado</strong>
            <div id="fps-box"></div>
        </div>

        <button onclick="salvarBuild()" class="btn-comprar" style="margin-top:15px;">
            Salvar Build
        </button>

    </aside>

</div>

</main>

</body>
</html>
