<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XPTO Store | Login</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="database.js" defer></script>
  <script src="auth.js" defer></script>
  <script src="session.js" defer></script>
  <link src="nova-senha.html">
</head>

<body>
  <header class="topbar">
    <h1>XPTO STORE</h1>

    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="loja.html">Loja</a></li>
        <li><a href="servicos.html">Serviços</a></li>
        <li><a href="contato.html">Atendimento</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <div class="auth-container">
      <h2>Área do Cliente</h2>

      <div class="auth-tabs">
        <button class="auth-tab" id="btn-login">Entrar</button>

        <button class="auth-tab ativo" id="btn-cadastro">Cadastrar</button>
      </div>

      <form class="auth-form" id="form-auth">
        <input type="text" id="nome" placeholder="Nome completo" required />

        <input type="tel" id="telefone" placeholder="Telefone" required />

        <input type="email" id="email" placeholder="E-mail" required />

        <input type="password" id="senha" placeholder="Senha" required />

      <a href="#" id="esqueciSenha" class="only-login">
        Esqueci minha senha
      </a>

      <label class="checkbox-termos only-login">

        <input type="checkbox" id="aceitouTermos">

          Li e aceito os
          <a href="termos.html">
            Termos de Uso
          </a>

      </label>

        <button type="submit" class="btn-finalizar" id="btn-submit">
          Cadastrar
        </button>
      </form>
    </div>
  </main>


</body>

</html>
